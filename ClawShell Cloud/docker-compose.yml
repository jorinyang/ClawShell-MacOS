version: "3.9"

services:
  # Cloud Hub — MCP WebSocket Router
  cloud-hub:
    build:
      context: ./cloud-hub
      dockerfile: Dockerfile
    container_name: clawshell-cloud-hub
    ports:
      - "8443:8443"
      - "8080:8080"
    environment:
      - JWT_SECRET=${JWT_SECRET:?Please set JWT_SECRET}
      - USER_ID=${USER_ID:?Please set USER_ID}
      - OSS_ENDPOINT=${OSS_ENDPOINT:-}
      - OSS_BUCKET=${OSS_BUCKET:-}
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID:-}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET:-}
      - OSS_VAULT_PREFIX=${OSS_VAULT_PREFIX:-vault/}
      - SKILL_URL=ws://skill-registry:8445
      - KANBAN_URL=ws://kanban:8446
      - LOG_LEVEL=INFO
    volumes:
      - ./cloud-hub/data:/data
      - ./cloud-hub/config.yaml:/app/config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - clawshell-net

  # Skill Registry — 技能注册表
  skill-registry:
    build:
      context: ./skill-registry
      dockerfile: Dockerfile
    container_name: clawshell-skill-registry
    ports:
      - "8445:8445"
    environment:
      - REGISTRY_DB_PATH=/data/registry.db
    volumes:
      - ./skill-registry/data:/data
    restart: unless-stopped
    networks:
      - clawshell-net

  # Kanban MCP — 任务看板
  kanban:
    build:
      context: ./kanban-mcp
      dockerfile: Dockerfile
    container_name: clawshell-kanban
    ports:
      - "8446:8446"
    environment:
      - KANBAN_DATA_PATH=/data
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - ./kanban-data:/data
    restart: unless-stopped
    networks:
      - clawshell-net

  # Nginx — 反向代理 + SSL
  nginx:
    image: nginx:alpine
    container_name: clawshell-nginx
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      cloud-hub:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - clawshell-net

networks:
  clawshell-net:
    driver: bridge

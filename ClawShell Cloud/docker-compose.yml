version: "3.9"

services:
  # ── Cloud Hub — 协同调度中枢 ─────────────────────────────────────────────
  # 承载：记忆域 + 知识域 + 任务域 + 技能域 + 节点域
  # 数据全部存在 OSS，不依赖 Docker Volume
  cloud-hub:
    build:
      context: ./cloud-hub
      dockerfile: Dockerfile
    container_name: clawshell-cloud-hub
    ports:
      - "8443:8443"   # WebSocket (MCP + edge_register)
      - "8080:8080"   # REST API
    environment:
      - JWT_SECRET=${JWT_SECRET:?Please set JWT_SECRET}
      - USER_ID=${USER_ID:?Please set USER_ID}
      # OSS 存储
      - OSS_ENDPOINT=${OSS_ENDPOINT:?Please set OSS_ENDPOINT}
      - OSS_BUCKET=${OSS_BUCKET:?Please set OSS_BUCKET}
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID:?Please set OSS_ACCESS_KEY_ID}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET:?Please set OSS_ACCESS_KEY_SECRET}
      - OSS_VAULT_PREFIX=${OSS_VAULT_PREFIX:-vault/}
      # 记忆域：memos-cloud
      - MEMOS_API_BASE=${MEMOS_API_BASE:-}
      - MEMOS_API_KEY=${MEMOS_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - clawshell-net

  # ── Nginx — TLS 终止 ───────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: clawshell-nginx
    ports:
      - "443:443"   # HTTPS
      - "80:80"     # HTTP
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      cloud-hub:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - clawshell-net

networks:
  clawshell-net:
    driver: bridge

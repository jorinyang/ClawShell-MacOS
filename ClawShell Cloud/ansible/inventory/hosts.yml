---
# Ansible Inventory — ClawShell Cloud
all:
  children:
    clawshell_cloud:
      hosts:
        ecs_instance:
          ansible_host: "{{ lookup('env', 'ECS_IP') }}"
          ansible_user: root
          ansible_ssh_private_key_file: "{{ lookup('env', 'SSH_KEY_PATH') }}"
          ansible_port: 22
          cloudhub_domain: "{{ lookup('env', 'CLOUD_DOMAIN') }}"
